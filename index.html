<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Loan Origination — Unsecured Business Term Loan — Complete Journey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fraunces:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#F4F3F0;--surface:#FFFFFF;--surface2:#EEEDEA;--surface3:#E4E3DF;
--text:#1B1B19;--text2:#5A5954;--text3:#8C8B85;--text4:#B0AFA9;
--accent:#0E7C62;--accent-light:#D6F0E8;--accent-mid:#A3DCC8;--accent-dark:#065C48;--accent-bg:#F0FAF6;
--human:#C4421A;--human-light:#FDE8E0;--human-mid:#F5B8A0;--human-dark:#8B2E10;
--blue:#1B6CB0;--blue-light:#E0F0FC;
--amber:#B87D14;--amber-light:#FEF3D6;
--red:#C0392B;--red-light:#FCE4E4;
--green:#1E8C5E;--green-light:#D4F5E5;
--border:#DDDCD8;--border2:#CCCBC5;
--radius:8px;--radius-lg:12px;
--font:'DM Sans',system-ui,sans-serif;
--display:'Fraunces',Georgia,serif;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}
@keyframes progressFill{from{width:0}to{width:var(--fill,100%)}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.5}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--display);font-size:17px;font-weight:700;color:var(--accent-dark)}
.logo span{font-weight:400;color:var(--text3);font-family:var(--font);font-size:12px;margin-left:6px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}

/* PROGRESS BAR */
.progress-track{position:sticky;top:48px;z-index:99;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px}
.progress-step{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text4);white-space:nowrap;cursor:pointer;transition:all .2s}
.progress-step:hover{color:var(--text2)}
.progress-step.done{color:var(--accent)}
.progress-step.active{color:var(--text);font-weight:600}
.progress-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);transition:all .3s}
.progress-step.done .progress-dot{background:var(--accent);border-color:var(--accent)}
.progress-step.active .progress-dot{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.progress-step.human-step.done .progress-dot{background:var(--human);border-color:var(--human)}
.progress-step.human-step.active .progress-dot{border-color:var(--human);box-shadow:0 0 0 3px var(--human-light)}
.progress-line{flex:0 0 16px;height:1px;background:var(--border)}
.progress-step.done+.progress-line{background:var(--accent)}

/* MAIN */
.main{display:flex;height:calc(100vh - 90px)}
.screen-pane{flex:1;overflow-y:auto;padding:24px 28px}
.agent-pane{width:360px;border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;flex-shrink:0}
.agent-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.agent-header h4{font-size:13px;font-weight:600;flex:1}
.agent-live{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.agent-body{flex:1;overflow-y:auto;padding:16px 18px}
.agent-body::-webkit-scrollbar{width:3px}
.agent-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* STEP HEADER */
.step-header{margin-bottom:20px;animation:fadeUp .4s ease}
.step-label{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.step-num{font-size:11px;font-weight:700;color:var(--accent-dark);background:var(--accent-light);padding:3px 10px;border-radius:12px}
.step-num.human{color:var(--human-dark);background:var(--human-light)}
.role-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.4px}
.role-sales{background:#E0F0FC;color:#1B6CB0}
.role-credit{background:#F3E8FF;color:#6B21A8}
.role-sanction{background:#FEF3D6;color:#92400E}
.role-ops{background:#FDE8E0;color:#9A3412}
.step-title{font-family:var(--display);font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.step-desc{font-size:13px;color:var(--text2);margin-top:4px;max-width:600px;line-height:1.6}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden}
.card-head{padding:14px 16px;border-bottom:1px solid var(--surface2);display:flex;align-items:center;gap:8px}
.card-head h5{font-size:13px;font-weight:600;flex:1}
.card-body{padding:16px}
.card-accent{border-left:3px solid var(--accent)}
.card-human{border-left:3px solid var(--human)}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column}
.form-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.form-input{padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface)}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-val{padding:8px 11px;background:var(--surface2);border-radius:6px;font-size:13px;font-weight:500}
.form-val.highlight{background:var(--accent-light);color:var(--accent-dark);font-weight:600}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:600;letter-spacing:.2px}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text3)}
.badge-accent{background:var(--accent-light);color:var(--accent-dark)}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:1px solid;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-dark)}
.btn-outline{background:none;color:var(--text2);border-color:var(--border)}
.btn-outline:hover{background:var(--surface2)}
.btn-human{background:var(--human);color:#fff;border-color:var(--human)}
.btn-human:hover{background:var(--human-dark)}
.btn-sm{padding:6px 12px;font-size:11px}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:7px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);background:var(--surface2)}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--surface2)}
.kv-table{width:100%;font-size:12px}
.kv-table td{padding:5px 0;vertical-align:top}
.kv-table td:first-child{color:var(--text3);width:42%;padding-right:10px}
.kv-table td:last-child{font-weight:500}
.kv-table tr+tr td{border-top:1px solid var(--surface2)}

/* DOC ITEMS */
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.doc-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:12px;font-weight:500}
.doc-status{font-size:10px;margin-top:1px}
.doc-check{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}

/* AGENT EVENTS */
.agent-event{position:relative;padding:0 0 16px 24px;border-left:1.5px solid var(--border);opacity:0;transform:translateX(12px)}
.agent-event.visible{opacity:1;transform:translateX(0);transition:all .4s ease}
.agent-event:last-child{border-left-color:transparent}
.agent-event::before{content:'';position:absolute;left:-5px;top:3px;width:10px;height:10px;border-radius:50%;border:2px solid}
.agent-event.ai::before{border-color:var(--accent);background:var(--accent-light)}
.agent-event.ai.active::before{background:var(--accent);animation:pulse 1.5s infinite}
.agent-event.human::before{border-color:var(--human);background:var(--human-light)}
.agent-event.human.active::before{background:var(--human);animation:pulse 1.5s infinite}
.agent-event.pending::before{border-color:var(--border);background:var(--surface2)}
.agent-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.agent-event.ai .agent-label{color:var(--accent)}
.agent-event.human .agent-label{color:var(--human)}
.agent-event.pending .agent-label{color:var(--text4)}
.agent-name{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text)}
.agent-reasoning{font-size:11px;color:var(--text2);line-height:1.6;margin:6px 0;padding:8px 10px;background:var(--surface2);border-radius:6px;border-left:2px solid var(--accent-mid);font-style:italic}
.agent-event.human .agent-reasoning{border-left-color:var(--human-mid)}
.agent-outputs{list-style:none;padding:0;font-size:11px;color:var(--text2);line-height:1.6}
.agent-outputs li{padding:2px 0 2px 14px;position:relative}
.agent-outputs li::before{content:'→';position:absolute;left:0;color:var(--text4);font-size:10px}
.agent-flag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-top:4px}
.agent-flag.ok{background:var(--green-light);color:var(--green)}
.agent-flag.warn{background:var(--amber-light);color:var(--amber)}
.agent-flag.critical{background:var(--red-light);color:var(--red)}
.agent-flag.info{background:var(--blue-light);color:var(--blue)}
.agent-meta{font-size:10px;color:var(--text4);margin-top:4px}
.agent-handoff{margin:8px 0;padding:10px 12px;background:var(--human-light);border:1px solid var(--human-mid);border-radius:var(--radius);font-size:11px}
.agent-handoff-title{font-weight:700;color:var(--human-dark);display:flex;align-items:center;gap:5px;margin-bottom:3px}
.agent-handoff-detail{color:var(--human-dark);opacity:.8;line-height:1.5}
.agent-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text4);margin:12px 0 8px;padding-left:24px}

/* METRICS */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.metric-card{background:var(--surface2);border-radius:var(--radius);padding:10px 12px}
.metric-val{font-size:18px;font-weight:700;line-height:1.2}
.metric-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

/* OFFER */
.offer-card{background:linear-gradient(135deg,var(--accent-dark),#0A9E76);color:#fff;border-radius:var(--radius-lg);padding:20px;margin-bottom:14px}
.offer-amount{font-family:var(--display);font-size:32px;font-weight:700}
.offer-sub{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.offer-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.offer-item{background:rgba(255,255,255,.15);border-radius:var(--radius);padding:10px}
.offer-item-val{font-size:15px;font-weight:600}
.offer-item-label{font-size:9px;opacity:.7}

/* CHECKLIST */
.cp-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface2)}
.cp-item:last-child{border:none}
.cp-check{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.cp-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.cp-check.fail{background:var(--red-light);border-color:var(--red);color:var(--red)}
.cp-label{font-size:12px;flex:1}
.cp-status{font-size:10px;font-weight:600}

/* NAV */
.step-nav{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;z-index:50}
.step-nav-info{flex:1;font-size:12px;color:var(--text3)}
.step-nav-info strong{color:var(--text)}
.auto-play{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);cursor:pointer;user-select:none}
.auto-play input{accent-color:var(--accent)}

/* LOADING DOTS */
.loading-dots{display:inline-flex;gap:3px}
.loading-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dotPulse 1.4s infinite ease-in-out both}
.loading-dots span:nth-child(1){animation-delay:-.32s}
.loading-dots span:nth-child(2){animation-delay:-.16s}

/* PROGRESS BAR SMALL */
.prog-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:4px 0}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .6s ease}

/* SECTION */
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text4);margin-bottom:8px}

/* SCREEN AREA SCROLL */
.screen-pane::-webkit-scrollbar{width:4px}
.screen-pane::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* RESPONSIVE */
@media(max-width:1000px){.agent-pane{width:280px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">LoanFlow<span>Unsecured Business Term Loan</span></div>
  <div class="topbar-right">
    <span class="badge badge-accent">Assisted journey — sales officer led</span>
  </div>
</div>

<div class="progress-track" id="progressTrack"></div>

<div class="main">
  <div class="screen-pane" id="screenPane"></div>
  <div class="agent-pane">
    <div class="agent-header">
      <div class="agent-live"></div>
      <h4>AI agent activity</h4>
      <span class="badge badge-green" style="font-size:9px">LIVE</span>
    </div>
    <div class="agent-body" id="agentBody"></div>
  </div>
</div>

<div class="step-nav">
  <div class="auto-play"><input type="checkbox" id="autoPlay"><label for="autoPlay">Auto-advance agents</label></div>
  <div class="step-nav-info">Step <strong id="stepCurrent">1</strong> of <strong id="stepTotal">12</strong></div>
  <button class="btn btn-outline btn-sm" id="prevBtn" onclick="go(-1)">← Previous</button>
  <button class="btn btn-primary btn-sm" id="nextBtn" onclick="go(1)">Next step →</button>
</div>

<script>
// ===================== STEP DATA =====================
const steps = [
// STEP 1
{
  num:1, title:'Lead registration & pre-qualification',
  role:'Sales officer', roleClass:'role-sales', isHuman:false,
  desc:'The sales officer enters basic business details collected from the applicant. The AI pre-qualification agent instantly checks eligibility against policy rules.',
  screen:`
<div class="card card-accent">
  <div class="card-head"><h5>New loan application — lead registration</h5><span class="badge badge-blue">BTL-UNSEC</span></div>
  <div class="card-body">
    <div class="section-label">Applicant business details</div>
    <div class="form-row"><div class="form-group"><span class="form-label">Entity name</span><input class="form-input" value="Apex Manufacturing Pvt Ltd"></div><div class="form-group"><span class="form-label">PAN</span><input class="form-input" value="AABCS1234F"></div></div>
    <div class="form-row"><div class="form-group"><span class="form-label">Constitution</span><div class="form-val">Private Limited Company</div></div><div class="form-group"><span class="form-label">Year of incorporation</span><div class="form-val">2019 (7 years vintage)</div></div></div>
    <div class="form-row"><div class="form-group"><span class="form-label">Annual turnover (FY24)</span><input class="form-input" value="₹4,50,00,000"></div><div class="form-group"><span class="form-label">Industry sector</span><div class="form-val">Manufacturing — Auto components</div></div></div>
    <div class="form-row"><div class="form-group"><span class="form-label">Loan amount requested</span><input class="form-input" value="₹75,00,000"></div><div class="form-group"><span class="form-label">Purpose</span><div class="form-val">Working capital augmentation</div></div></div>
    <div class="form-row"><div class="form-group"><span class="form-label">Promoter / director 1</span><input class="form-input" value="Rajesh Kumar — DIN 08765432"></div><div class="form-group"><span class="form-label">Promoter / director 2</span><input class="form-input" value="Meena Kumar — DIN 09876543"></div></div>
    <div class="form-row"><div class="form-group"><span class="form-label">Registered address</span><input class="form-input" value="Plot 42, MIDC Andheri East, Mumbai 400093"></div><div class="form-group"><span class="form-label">GST registration</span><input class="form-input" value="27AABCS1234F1ZD"></div></div>
    <div style="margin-top:16px;padding:14px;background:var(--accent-bg);border:1px solid var(--accent-mid);border-radius:var(--radius-lg)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dark)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
        <span style="font-weight:700;color:var(--accent-dark);font-size:13px">Pre-qualified — eligible for BTL up to ₹75,00,000</span>
      </div>
      <div style="font-size:11px;color:var(--accent-dark);line-height:1.6">All basic eligibility criteria met: vintage &gt;3 years ✓ | turnover &gt;₹1 Cr ✓ | geography: Mumbai (approved) ✓ | sector: manufacturing (approved) ✓ | entity not in negative/caution list ✓</div>
    </div>
  </div>
</div>
<div style="font-size:11px;color:var(--text3);font-style:italic;margin-top:-6px">↑ Entity details auto-enriched from MCA, GSTN, and Udyam registries via API</div>
  `,
  agents:[
    {type:'ai',status:'active',label:'Agent activated',name:'Lead capture & pre-qualification agent',
     reasoning:'Received lead input with PAN AABCS1234F. I will first validate entity existence on MCA, then run eligibility rules against the BTL-UNSEC product program policy.',
     outputs:['PAN lookup → entity confirmed: Apex Manufacturing Pvt Ltd (CIN: U28999MH2019PTC123456)','MCA API pull → entity status: Active, no winding-up proceedings','Udyam registry → MSME registration confirmed (UDYAM-MH-07-0012345)','GSTN validation → GST 27AABCS1234F1ZD active, regular filing'],
     flag:{type:'ok',text:'Entity verified across MCA, GSTN, Udyam'},meta:'2.1 seconds'},
    {type:'ai',status:'active',label:'Rules engine',name:'Policy eligibility check',
     reasoning:'Checking against BTL-UNSEC-SME product program parameters: minimum vintage 3 years, minimum turnover ₹1 Cr, approved geography, approved sector, not on internal negative list or RBI caution list.',
     outputs:['Vintage: 7 years ✓ (min 3)','Turnover: ₹4.5 Cr ✓ (min ₹1 Cr)','Geography: Mumbai — approved ✓','Sector: Manufacturing — approved (not in restricted list) ✓','Negative list screening: clear ✓','RBI caution list: clear ✓'],
     flag:{type:'ok',text:'Pre-qualified — all 6 eligibility criteria passed'},meta:'0.8 seconds'},
    {type:'ai',status:'pending',label:'Queued',name:'Document intake & OCR agent',outputs:['Waiting for sales officer to upload documents']},
  ]
},

// STEP 2
{
  num:2, title:'Document collection & OCR processing',
  role:'Sales officer', roleClass:'role-sales', isHuman:false,
  desc:'The sales officer uploads documents collected from the business owner. The AI document agent processes each file — running OCR, extracting structured data, cross-validating across documents, and flagging inconsistencies.',
  screen:`
<div class="card card-accent">
  <div class="card-head"><h5>Document upload & processing</h5><span class="badge badge-green">5 of 6 verified</span></div>
  <div class="card-body">
    <div class="doc-item" style="border-color:var(--accent-mid);background:var(--accent-bg)">
      <div class="doc-icon" style="background:var(--green-light);color:var(--green)">ITR</div>
      <div class="doc-info"><div class="doc-name">Income Tax Returns — AY 2023-24 & AY 2024-25</div><div class="doc-status" style="color:var(--green)">✓ OCR extracted • Gross income matched across both years • PAN cross-validated</div></div>
      <div class="doc-check" style="background:var(--green);color:#fff">✓</div>
    </div>
    <div class="doc-item" style="border-color:var(--accent-mid);background:var(--accent-bg)">
      <div class="doc-icon" style="background:var(--green-light);color:var(--green)">GST</div>
      <div class="doc-info"><div class="doc-name">GST returns — GSTR-3B (12 months) + GSTR-2A (6 months)</div><div class="doc-status" style="color:var(--green)">✓ Monthly revenue extracted • 3B-2A reconciliation: 97.8% match • No discrepancy flags</div></div>
      <div class="doc-check" style="background:var(--green);color:#fff">✓</div>
    </div>

// ===================== RENDER ENGINE =====================
let currentStep = 0;
const totalSteps = steps.length;

function renderProgressTrack(){
  const track = document.getElementById('progressTrack');
  let html = '';
  steps.forEach((s,i)=>{
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    const humanCls = s.isHuman ? 'human-step' : '';
    html += `<div class="progress-step ${cls} ${humanCls}" onclick="jumpTo(${i})"><div class="progress-dot"></div><span style="display:none">${s.num}</span></div>`;
    if(i < steps.length -1) html += `<div class="progress-line"></div>`;
  });
  track.innerHTML = html;
}

function renderScreen(){
  const s = steps[currentStep];
  const pane = document.getElementById('screenPane');
  pane.scrollTop = 0;
  pane.innerHTML = `
    <div class="step-header">
      <div class="step-label">
        <span class="step-num ${s.isHuman?'human':''}">Step ${s.num} of ${totalSteps}</span>
        <span class="role-badge ${s.roleClass}">${s.role}</span>
        ${s.isHuman ? '<span class="badge" style="background:var(--human);color:#fff;font-size:9px">HUMAN-IN-THE-LOOP</span>' : ''}
      </div>
      <div class="step-title">${s.title}</div>
      <div class="step-desc">${s.desc}</div>
    </div>
    ${s.screen}
  `;
}

function renderAgents(){
  const s = steps[currentStep];
  const body = document.getElementById('agentBody');
  body.scrollTop = 0;
  const autoPlay = document.getElementById('autoPlay').checked;

  let html = '';
  s.agents.forEach((a,i)=>{
    const statusLabel = a.status === 'active' ? (a.type==='human'?'Human action':'Processing') : a.status === 'pending' ? 'Queued' : 'Done';
    html += `<div class="agent-event ${a.type} ${a.status}" id="agent-${i}" style="transition-delay:${autoPlay ? (i*0.6)+'s' : '0s'}">`;
    html += `<div class="agent-label">${a.label || statusLabel}</div>`;
    html += `<div class="agent-name">${a.name}</div>`;
    if(a.reasoning){
      html += `<div class="agent-reasoning">"${a.reasoning}"</div>`;
    }
    if(a.outputs){
      html += `<ul class="agent-outputs">${a.outputs.map(o=>`<li>${o}</li>`).join('')}</ul>`;
    }
    if(a.flag){
      html += `<div class="agent-flag ${a.flag.type}">${a.flag.text}</div>`;
    }
    if(a.meta){
      html += `<div class="agent-meta">${a.meta}</div>`;
    }
    html += `</div>`;
  });
  body.innerHTML = html;

  // Animate in
  setTimeout(()=>{
    s.agents.forEach((a,i)=>{
      const el = document.getElementById('agent-'+i);
      if(el){
        const delay = autoPlay ? i * 600 : i * 150;
        setTimeout(()=> el.classList.add('visible'), delay);
      }
    });
  }, 100);
}

function updateNav(){
  document.getElementById('stepCurrent').textContent = currentStep + 1;
  document.getElementById('stepTotal').textContent = totalSteps;
  document.getElementById('prevBtn').disabled = currentStep === 0;
  document.getElementById('prevBtn').style.opacity = currentStep === 0 ? '.4' : '1';
  document.getElementById('nextBtn').textContent = currentStep === totalSteps -1 ? 'Journey complete ✓' : 'Next step →';
  document.getElementById('nextBtn').disabled = currentStep === totalSteps -1;
  document.getElementById('nextBtn').style.opacity = currentStep === totalSteps -1 ? '.4' : '1';
}

function go(dir){
  const next = currentStep + dir;
  if(next < 0 || next >= totalSteps) return;
  currentStep = next;
  render();
}
function jumpTo(i){
  currentStep = i;
  render();
}
function render(){
  renderProgressTrack();
  renderScreen();
  renderAgents();
  updateNav();
}

// Keyboard nav
document.addEventListener('keydown', e=>{
  if(e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if(e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
});

render();
</script>
</body>
</html>
